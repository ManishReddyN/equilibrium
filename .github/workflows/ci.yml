name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  app:
    name: App (typecheck, lint, test, Android debug build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint (ESLint + no-emoji)
        run: npm run lint

      - name: Write placeholder env file
        # .env is gitignored (real one is per-developer, see .env.example) and react-native-dotenv
        # inlines these as literal values at require-time via the `@env` alias -- `src/lib/env.ts`'s
        # zod schema throws if they're undefined, and any test that transitively imports
        # `lib/supabase.ts` (SessionProvider -> useHouseholdProfile, App.tsx, ...) does exactly
        # that. Same placeholder-value pattern as the Firebase config below; a syntactically valid
        # URL + non-empty string is all the schema requires, no real Supabase project needed since
        # these tests never make a real network call.
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_ANON_KEY=placeholder-anon-key
          EOF

      - name: Unit tests
        run: npx jest --ci

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Caches ~/.gradle/caches + wrapper dists across runs (keyed on wrapper/lockfiles
      # internally) and enables the CI-side half of the --build-cache task-output cache
      # used below. This is what turns a cold ~17min native (re)compile into a
      # mostly-cache-hit one on subsequent runs.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Write placeholder Firebase config
        # google-services.json is gitignored (real one is per-developer/CI-injected,
        # see docs/RUNBOOK.md) but the google-services Gradle plugin hard-fails if
        # the file is entirely absent, so CI needs the same placeholder devs use locally.
        run: |
          cat > android/app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "equilibrium-app-placeholder",
              "storage_bucket": "equilibrium-app-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {"package_name": "com.equilibrium.app"}
                },
                "oauth_client": [],
                "api_key": [{"current_key": "PLACEHOLDER_REPLACED_BY_REAL_FIREBASE_PROJECT_IN_PHASE_5"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}}
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true

      - name: Install required Android SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;35.0.0" "platform-tools" > /dev/null

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Android debug build
        working-directory: app/android
        # This build only exists to prove the app compiles -- CI never installs the APK on a
        # device/emulator -- so it's restricted to a single ABI instead of the
        # armeabi-v7a/arm64-v8a/x86/x86_64 default in gradle.properties (used for real local/
        # release builds). Native modules (Hermes, Reanimated, RNScreens, etc.) get built via
        # CMake/NDK per ABI, so this cuts that part of the build ~4x. Override mechanism is the
        # one gradle.properties itself documents (`-PreactNativeArchitectures=...`).
        run: ./gradlew assembleDebug --no-daemon --build-cache -PreactNativeArchitectures=x86_64

  backend:
    name: Backend (Supabase migrations, pgTAP, Prisma drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Supabase CLI
        # Pinned to match the exact version used to generate the committed prisma/schema.prisma
        # (via `supabase --version` locally) -- newer CLI releases bundle newer GoTrue/auth images
        # whose schema can gain columns (e.g. sso_providers.custom_claims_allowlist), which broke
        # the Prisma drift check when CI installed "latest" instead. See docs/DECISIONS.md.
        run: npm install -g supabase@2.108.0

      - name: Start local Supabase stack (applies migrations)
        run: supabase start

      - name: pgTAP test suite
        run: supabase test db

      - name: Install Prisma
        working-directory: prisma
        run: npm ci

      - name: Prisma validate
        working-directory: prisma
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@127.0.0.1:54322/postgres'
        run: npx prisma validate

      - name: Prisma drift check
        working-directory: prisma
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@127.0.0.1:54322/postgres'
        run: |
          cp schema.prisma /tmp/schema.prisma.committed
          npx prisma db pull --print > /tmp/schema.prisma.pulled 2>/dev/null
          diff -B /tmp/schema.prisma.committed /tmp/schema.prisma.pulled
